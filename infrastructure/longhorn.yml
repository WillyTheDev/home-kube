apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://charts.longhorn.io'
    chart: longhorn
    targetRevision: 1.6.0
    helm:
      values: |
        persistence:
          defaultClass: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipNodesLookup=true
    retry:
      limit: 5 # Gives it a chance to recreate the SA if it fails initially
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
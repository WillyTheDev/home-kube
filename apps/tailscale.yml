apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://pkgs.tailscale.com/helmcharts'
    chart: tailscale-operator
    # Utilisation de la version exacte trouvée dans l'index
    targetRevision: 1.94.2
    helm:
      values: |
        oauth:
          secretName: "tailscale-auth"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true